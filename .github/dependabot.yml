version: 2

# PRs land on beta (the active development branch). Stable releases on main
# pick up dependency bumps automatically via the normal beta -> main merge,
# so no separate target-branch is needed for main.

updates:
  - package-ecosystem: pip
    directory: /
    target-branch: beta
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: github-actions
    directory: /
    target-branch: beta
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
